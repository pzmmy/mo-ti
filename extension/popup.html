<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剪藏到墨屉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 14px;
      color: #333;
      background: #f8f9fa;
    }

    .container {
      padding: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8e8e8;
    }

    .header-icon {
      width: 24px;
      height: 24px;
      background: #3c3c8c;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 14px;
      color: #666;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .icon-btn:hover {
      background: #e8e8f0;
      border-color: #c0c0d0;
      color: #3c3c8c;
    }

    /* Page Info */
    .page-info {
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e8e8e8;
    }

    .page-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .page-url {
      font-size: 11px;
      color: #999;
      word-break: break-all;
      line-height: 1.3;
    }

    /* Form */
    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 13px;
      color: #333;
      background: #fff;
      transition: border-color 0.15s;
    }

    .form-input:focus {
      outline: none;
      border-color: #3c3c8c;
      box-shadow: 0 0 0 2px rgba(60, 60, 140, 0.1);
    }

    .form-input::placeholder {
      color: #bbb;
    }

    /* Mode Selector */
    .mode-group {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .mode-btn {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      color: #666;
      text-align: center;
      transition: all 0.15s;
    }

    .mode-btn:hover {
      border-color: #b0b0c8;
      background: #f0f0f8;
    }

    .mode-btn.active {
      border-color: #3c3c8c;
      background: #3c3c8c;
      color: #fff;
    }

    /* Tags */
    .tags-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 8px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fff;
      min-height: 36px;
      cursor: text;
    }

    .tags-input-wrapper:focus-within {
      border-color: #3c3c8c;
      box-shadow: 0 0 0 2px rgba(60, 60, 140, 0.1);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      background: #e8e8f0;
      border-radius: 12px;
      font-size: 12px;
      color: #3c3c8c;
    }

    .tag-remove {
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      color: #888;
    }

    .tag-remove:hover {
      color: #e74c3c;
    }

    .tags-input {
      flex: 1;
      min-width: 80px;
      border: none;
      outline: none;
      font-size: 13px;
      padding: 2px 0;
      background: transparent;
    }

    /* Save Button */
    .save-btn {
      width: 100%;
      padding: 10px;
      background: #3c3c8c;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .save-btn:hover {
      background: #2e2e70;
    }

    .save-btn:active {
      transform: scale(0.98);
    }

    .save-btn:disabled {
      background: #b0b0c0;
      cursor: not-allowed;
    }

    /* Status */
    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      line-height: 1.4;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
    }

    .status.info {
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #bbdefb;
    }

    /* Loading */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      justify-content: center;
    }

    .footer-link {
      font-size: 12px;
      color: #999;
      text-decoration: none;
    }

    .footer-link:hover {
      color: #3c3c8c;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">墨</div>
      <div class="header-title">剪藏到墨屉</div>
      <div class="header-actions">
        <a href="#" class="icon-btn" id="settingsBtn" title="设置">⚙</a>
      </div>
    </div>

    <!-- Page Info -->
    <div class="page-info">
      <div class="page-title" id="pageTitle">加载中...</div>
      <div class="page-url" id="pageUrl"></div>
    </div>

    <!-- Mode Selector -->
    <div class="form-label">剪藏模式</div>
    <div class="mode-group">
      <button class="mode-btn active" data-mode="full">全文</button>
      <button class="mode-btn" data-mode="readability">正文</button>
      <button class="mode-btn" data-mode="selection">选中文字</button>
    </div>

    <!-- Save Path -->
    <div class="form-group">
      <label class="form-label" for="savePath">保存路径</label>
      <input type="text" class="form-input" id="savePath" placeholder="/clippings/" />
    </div>

    <!-- Tags -->
    <div class="form-group">
      <label class="form-label">标签</label>
      <div class="tags-input-wrapper" id="tagsWrapper">
        <input type="text" class="tags-input" id="tagsInput" placeholder="输入标签后按回车/逗号" />
      </div>
    </div>

    <!-- Save Button -->
    <button class="save-btn" id="saveBtn">
      <span id="saveBtnText">剪藏到墨屉</span>
    </button>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- Footer -->
    <div class="footer">
      <a href="#" class="footer-link" id="settingsLink">WebDAV 设置</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
