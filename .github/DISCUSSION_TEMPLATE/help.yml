name: 使用求助
description: 遇到使用问题或 Bug，在这里提问
title: "[求助] "
labels: ["question", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢你提交使用求助 🙋‍♂️

        在提问前，请先确认：
        - 已搜索过 [已有 Issues](https://github.com/nousresearch/mo-ti/issues) 和 [讨论区](https://github.com/nousresearch/mo-ti/discussions)
        - 已查阅 [项目文档](https://mo-ti.nousresearch.com/)
        - 已尝试使用最新版本

  - type: dropdown
    id: category
    attributes:
      label: 问题分类
      options:
        - 使用问题（功能不生效、报错等）
        - 安装 / 配置问题
        - 兼容性问题
        - 性能问题
        - 文档不清楚
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本号
      description: 你正在使用的 mo-ti 版本（设置 → 关于 中查看）
      placeholder: "例如 v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 运行平台
      options:
        - Windows
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (AppImage)
        - Linux (Flatpak)
        - Web / 浏览器
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰、简洁地描述你遇到的问题
      placeholder: 发生了什么？你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 打开 mo-ti
        2. 点击 ...
        3. 出现错误 ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 如果有错误日志、控制台输出或截图，请贴在这里
      render: shell
      placeholder: 请提供相关日志或截图（可选）
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他有助于定位问题的信息
      placeholder: 如自定义配置、插件列表、修改过的文件等
    validations:
      required: false
