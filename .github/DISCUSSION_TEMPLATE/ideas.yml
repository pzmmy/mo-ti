name: 功能建议
description: 为 mo-ti 提出新功能或改进建议
title: "[建议] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢你的建议 💡

        请先搜索 [已有 Issues](https://github.com/nousresearch/mo-ti/issues) 和 [讨论区](https://github.com/nousresearch/mo-ti/discussions)，
        避免重复提交相同的建议。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决了什么痛点或需求？
      placeholder: 当你……的时候，你希望……
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的方案
      description: 你期望的具体实现或行为
      placeholder: 希望能新增一个……功能，它能……
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他实现方式或现有 workaround
      placeholder: 目前可以通过……勉强实现，但……
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 仅影响少量用户
        - 影响多数用户
        - 影响所有用户
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 参考 / 灵感
      description: 其他项目中类似功能的截图或链接
      placeholder: 例如 Obsidian 的……插件、Notion 的……功能
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: 确认
      options:
        - label: 我愿意参与实现这个功能（可选）
        - label: 我已经搜索过，没有重复的建议
    validations:
      required: false
