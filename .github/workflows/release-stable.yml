name: Release (Stable)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build-linux:
    name: "Linux (AppImage)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install Tauri system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libjavascriptcoregtk-4.1-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Build Tauri AppImage
        run: pnpm tauri build --bundles appimage
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: mo-ti-linux-x86_64
          path: src-tauri/target/release/bundle/appimage/*.AppImage
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: mo-ti-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  build-windows:
    name: "Windows (MSI)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Build Tauri MSI
        # Skip code signing by setting TAURI_SKIP_SIGNING
        env:
          TAURI_SKIP_SIGNING: true
        run: pnpm tauri build --bundles msi
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: mo-ti-windows-x86_64
          path: src-tauri/target/release/bundle/msi/*.msi
      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: mo-ti-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mo-ti-*
          merge-multiple: true
      - name: List artifacts
        run: ls -lh
      - name: Generate release notes
        run: |
          if [ -f RELEASE_NOTES_v${{ github.ref_name }}.md ]; then
            cp RELEASE_NOTES_v${{ github.ref_name }}.md RELEASE_NOTES.md
          elif [ -f RELEASE_NOTES.md ]; then
            echo "Using existing RELEASE_NOTES.md"
          else
            echo "墨屉 ${{ github.ref_name }}" > RELEASE_NOTES.md
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            *.AppImage
            *.deb
            *.msi
            *.exe
          draft: false
          prerelease: false
